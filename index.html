<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shaheen TV - Live Pakistani Channels</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="player-container" id="playerContainer">
    <div class="player-wrap">
      <div class="logo-overlay">
        <img src="https://bit.ly/Shaheen-TV-logo" alt="Shaheen TV">
      </div>
      <video id="videoplayer" src="https://bit.ly/Shaheen-TV-gif" controls playsinline poster="https://bit.ly/Shaheen-TV-Img"></video>
      <div class="channel-info" id="channelInfo"></div>
      <div class="current-channel hidden" id="currentChannelDisplay">
        <i class="fas fa-circle"></i>
        <span id="currentChannelName">Select a channel</span>
      </div>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading stream...</div>
      </div>
      <div class="error-overlay" id="errorOverlay" style="display: none;">
        <div class="error-icon">
          <i class="fas fa-exclamation-circle"></i>
        </div>
        <div class="error-title">Stream Error</div>
        <div class="error-message" id="errorMessage">There was a problem loading the stream. Please try again.</div>
        <button class="retry-btn" onclick="retryStream()">Retry Now</button>
      </div>
    </div>
    
    <div class="controls-container">
      <div class="controls">
        <button onclick="seek(-30)"><i class="fas fa-step-backward"></i> 30s</button>
        <button onclick="seek(-10)"><i class="fas fa-backward"></i> 10s</button>
        <button onclick="playVideo()" class="play-btn"><i class="fas fa-play"></i> Play</button>
        <button onclick="video.pause()"><i class="fas fa-pause"></i> Pause</button>
      </div>
    </div>
  </div>
  
  <div class="player-spacer" id="playerSpacer"></div>

  <!-- Social Media Section -->
  <div class="social-section">
    <h3>Stay Connected</h3>
    <div class="social-links">
      <a href="https://whatsapp.com/channel/0029VaC5Nk40VycCVuNq362Q" target="_blank" class="social-btn whatsapp">
        <i class="fab fa-whatsapp"></i> WhatsApp
      </a>
      <a href="https://youtube.com/@Shaheen_Mods" target="_blank" class="social-btn youtube">
        <i class="fab fa-youtube"></i> YouTube
      </a>
      <a href="https://t.me/shaheen_tv_hd" target="_blank" class="social-btn telegram">
        <i class="fab fa-telegram"></i> Telegram
      </a>
    </div>
  </div>

  <footer>Powered by Shaheen TV Developers</footer>

  <!-- External JavaScript -->
  


<!-- Channel Selector -->
<div class="channel-selector">
    <h3>Quick Access Channels</h3>
    <div class="channel-buttons">
        <!-- Yahan channels automatically load honge script se -->
    </div>
</div>

<!-- Script files -->
<script src="channels-data.js"></script>
<script src="script.js"></script>
</body>
</html>
